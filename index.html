<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav class="navbar">
                <div class="logo">
                    <img class="logo-img" src="images/map.svg" alt="logo">
                    <p class="logo-text">WeBarelyWork</p>
                </div>
                <img class="option-img" src="images/option.svg" alt="option-bar">
            </nav>
        </header>
        <main>
            <section class="section-1">
                <div class="hero">
                    <p class="heading" aria-label="heading">The best coworking spaces for lazy devs.</p>
                    <fieldset class="input-container">
                        <legend>Find Workspace in</legend>
                            <img src="images/location.svg" alt="map-icon">
                            <input type="text" placeholder="Bali, Indonesia">
                    </fieldset>
                    <button class="get-started-btn">Get Started</button>
                </div>
                <p class="exclusive">Exclusive</p>
            </section>
            <section class="section-2">
                <div class="content-box">
                    <div class="section-2-heading-area">
                        <p class="section-2-heading" aria-label="heading">Bored in Barcelona? Take a siesta at the Sky Garden.</p>
                        <div class="section-2-book-btn">
                            <a href="">Book</a>
                            <img src="images/arrow_right.svg" alt="">
                        </div>
                    </div>
                    <img class="sky-garden-img" src="images/sky_garden.jpg" alt="garden view coworking space">
                </div>
                
            </section>
            <section class="section-3">
                <div class="section-3-content-box">
                    <img class="generator-img" src="images/generator.jpg" alt="coworking space">
                    <div class="heading-area">
                        <p class="section-3-heading" aria-label="heading">Relaxing in Rio? Take some downtime at the Generator Hub.</p>
                        <div class="section-3-book-btn">
                            <a href="">Book</a>
                            <img src="images/arrow_right_white.svg" alt="">
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <div class="chatbox">
            <img src="images/chat.svg" alt="chat-icon">
        </div>
    </body>
</html>
